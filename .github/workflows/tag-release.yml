name: Tag Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - alias: release-musl-x86_64
            target: x86_64-unknown-linux-musl
          - alias: release-musl-aarch64
            target: aarch64-unknown-linux-musl
          - alias: release-musl-arm
            target: arm-unknown-linux-musleabi
          - alias: release-musl-armv7
            target: armv7-unknown-linux-musleabihf
          - alias: release-musl-mipsel
            target: mipsel-unknown-linux-musl
          - alias: release-musl-mips
            target: mips-unknown-linux-musl

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: mlugg/setup-zig@v1

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Build release binary
        run: cargo ${{ matrix.alias }}

      - name: Package artifact
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/outline-ss-rust" "dist/outline-ss-rust-${{ matrix.target }}"
          tar -C dist -czf "dist/outline-ss-rust-${{ matrix.target }}.tar.gz" "outline-ss-rust-${{ matrix.target }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tag-release-${{ matrix.target }}
          path: dist/outline-ss-rust-${{ matrix.target }}.tar.gz

  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: tag-release-*
          merge-multiple: true
          path: dist

      - name: Publish release from tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: false
          generate_release_notes: true
          make_latest: true
          files: dist/*.tar.gz
          fail_on_unmatched_files: true
