name: Nightly Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: nightly-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - alias: release-musl-x86_64
            target: x86_64-unknown-linux-musl
          - alias: release-musl-aarch64
            target: aarch64-unknown-linux-musl
          - alias: release-musl-arm
            target: arm-unknown-linux-musleabi
          - alias: release-musl-armv7
            target: armv7-unknown-linux-musleabihf

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Build release binary
        run: cargo ${{ matrix.alias }}

      - name: Package artifact
        env:
          ARTIFACT_VERSION: nightly-${{ github.sha }}
        run: |
          mkdir -p dist
          artifact_base="outline-ss-rust-${ARTIFACT_VERSION}-${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/outline-ss-rust" "dist/${artifact_base}"
          tar -C dist -czf "dist/${artifact_base}.tar.gz" "${artifact_base}"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: nightly-${{ github.sha }}-${{ matrix.target }}
          path: dist/outline-ss-rust-nightly-${{ github.sha }}-${{ matrix.target }}.tar.gz

  publish:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create nightly tag
        env:
          TAG_NAME: nightly-${{ github.sha }}
        run: |
          git fetch --tags --force
          if ! git rev-parse -q --verify "refs/tags/${TAG_NAME}" >/dev/null; then
            git tag "${TAG_NAME}" "${GITHUB_SHA}"
            git push origin "refs/tags/${TAG_NAME}"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: nightly-*
          merge-multiple: true
          path: dist

      - name: Publish nightly prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.sha }}
          name: Nightly ${{ github.sha }}
          prerelease: true
          generate_release_notes: true
          make_latest: false
          files: dist/*.tar.gz
          fail_on_unmatched_files: true
