name: Release Build

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      checkout_ref:
        required: false
        type: string
        default: ""
      prerelease:
        required: false
        type: boolean
        default: false
      make_latest:
        required: false
        type: string
        default: "true"
      release_name:
        required: false
        type: string
        default: ""
      artifact_version:
        required: false
        type: string
        default: ""
      rolling_tag:
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - alias: release-musl-x86_64
            target: x86_64-unknown-linux-musl

          - alias: release-musl-aarch64
            target: aarch64-unknown-linux-musl

    steps:
      - id: vars
        name: Resolve workflow variables
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ inputs.tag }}"
          checkout_ref="${{ inputs.checkout_ref }}"
          release_name="${{ inputs.release_name }}"
          artifact_version="${{ inputs.artifact_version }}"

          if [[ -z "$checkout_ref" ]]; then
            checkout_ref="$tag"
          fi

          if [[ -z "$release_name" ]]; then
            release_name="Release $tag"
          fi

          if [[ -z "$artifact_version" ]]; then
            if [[ "$tag" == v* ]]; then
              artifact_version="${tag#v}"
            else
              artifact_version="$tag"
            fi
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$checkout_ref" >> "$GITHUB_OUTPUT"
          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"
          echo "artifact_version=$artifact_version" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.vars.outputs.checkout_ref }}
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Install Rust target
        run: rustup target add "${{ matrix.target }}"

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Build release binary
        run: cargo "${{ matrix.alias }}"

      - name: Package artifact
        env:
          VERSION: ${{ steps.vars.outputs.artifact_version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          name="outline-ss-rust-v${VERSION}-${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/outline-ss-rust" "dist/${name}"
          chmod +x "dist/${name}"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ steps.vars.outputs.tag }}-${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v5
        if: ${{ inputs.rolling_tag }}
        with:
          fetch-depth: 0

      - name: Move rolling tag
        if: ${{ inputs.rolling_tag }}
        env:
          TAG: ${{ inputs.tag }}
          REF: ${{ inputs.checkout_ref }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin --tags --force
          git tag -f "$TAG" "$REF"
          git push origin "refs/tags/$TAG" --force

      - name: Reset rolling release
        if: ${{ inputs.rolling_tag }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          release_id="$(
            gh api "/repos/${REPO}/releases/tags/${TAG}" --jq '.id' 2>/dev/null || true
          )"

          if [[ -n "$release_id" ]]; then
            gh api -X DELETE "/repos/${REPO}/releases/${release_id}"
          fi

      - uses: actions/download-artifact@v7
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.release_name != '' && inputs.release_name || format('Release {0}', inputs.tag) }}
          prerelease: ${{ inputs.prerelease }}
          make_latest: ${{ inputs.make_latest }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS.txt
