name: Release

on:
  workflow_dispatch:
    inputs:
      major_minor:
        description: Major and minor version, for example 1.7
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.major_minor }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next patch version
        id: version
        env:
          MAJOR_MINOR: ${{ github.event.inputs.major_minor }}
        run: |
          if [[ ! "${MAJOR_MINOR}" =~ ^[0-9]+\.[0-9]+$ ]]; then
            echo "major_minor must look like 1.7" >&2
            exit 1
          fi

          git fetch --tags --force
          latest_tag="$(git tag -l "v${MAJOR_MINOR}.*" --sort=-v:refname | head -n 1)"

          if [[ -n "${latest_tag}" ]]; then
            current_patch="${latest_tag##*.}"
            next_patch=$((current_patch + 1))
          else
            next_patch=0
          fi

          version="${MAJOR_MINOR}.${next_patch}"
          tag="v${version}"

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Update Cargo version files
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]

          cargo_toml = Path("Cargo.toml")
          cargo_toml_text = cargo_toml.read_text()
          cargo_toml.write_text(re.sub(r'^version = "[^"]+"', f'version = "{version}"', cargo_toml_text, count=1, flags=re.MULTILINE))

          cargo_lock = Path("Cargo.lock")
          cargo_lock_text = cargo_lock.read_text()
          needle = 'name = "outline-ss-rust"\nversion = "'
          start = cargo_lock_text.index(needle) + len(needle)
          end = cargo_lock_text.index('"', start)
          cargo_lock.write_text(cargo_lock_text[:start] + version + cargo_lock_text[end:])
          PY

      - name: Validate lockfile state
        run: cargo metadata --locked --format-version 1 > /dev/null

      - name: Commit release version
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "Release ${TAG}"
          git tag "${TAG}"
          git push origin HEAD:main
          git push origin "refs/tags/${TAG}"

  build:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - alias: release-musl-x86_64
            target: x86_64-unknown-linux-musl
          - alias: release-musl-aarch64
            target: aarch64-unknown-linux-musl
          - alias: release-musl-arm
            target: arm-unknown-linux-musleabi
          - alias: release-musl-armv7
            target: armv7-unknown-linux-musleabihf

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Build release binary
        run: cargo ${{ matrix.alias }}

      - name: Package artifact
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/outline-ss-rust" "dist/outline-ss-rust-${{ matrix.target }}"
          tar -C dist -czf "dist/outline-ss-rust-${{ matrix.target }}.tar.gz" "outline-ss-rust-${{ matrix.target }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/outline-ss-rust-${{ matrix.target }}.tar.gz

  publish:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          prerelease: false
          generate_release_notes: true
          make_latest: true
          files: dist/*.tar.gz
          fail_on_unmatched_files: true
