# IPv4 example:
listen: "0.0.0.0:3000"
# IPv6 example:
# listen: "[::]:3000"

# Optional plain Shadowsocks listener.
# This starts a separate TCP+UDP service on the same address for classic `ss://` clients.
# It must differ from `listen`, `h3_listen`, and `metrics_listen`.
# ss_listen: "0.0.0.0:8388"

# Optional TLS for the TCP listener (HTTP/1.1 + HTTP/2 / RFC 8441).
# If set, clients should use `wss://` for the TCP listener.
# tls_cert_path: "./cert.pem"
# tls_key_path: "./key.pem"

# Optional HTTP/3 / QUIC listener for RFC 9220.
# This may reuse the same ip:port as `listen`, because H3 binds UDP while `listen` binds TCP.
# h3_listen: "0.0.0.0:3000"
# h3_cert_path: "./cert.pem"
# h3_key_path: "./key.pem"

# Optional Prometheus listener. Prefer binding this to loopback or a private network.
# metrics_listen: "127.0.0.1:9090"
metrics_path: "/metrics"

# Prefer IPv4 when resolving upstream targets.
# Useful when some clients or CDNs break over IPv6 but work over IPv4.
# prefer_ipv4_upstream: true

# Randomize the source address of every upstream IPv6 TCP connect and UDP NAT
# socket. Pick ONE of the two modes below (they are mutually exclusive); IPv4
# upstream traffic is unaffected in either case.
#
# Mode A — static CIDR. Each bind picks a random address inside the prefix.
# Typical setup: `ip -6 addr add 2001:db8:dead::1/64 dev eth0` so the whole /64
# is on-link; IPV6_FREEBIND (set automatically on Linux) lets bind() use any
# address from the prefix. Fallback when FREEBIND is unavailable:
# `ip -6 route add local 2001:db8:dead::/64 dev lo` (AnyIP).
# outbound_ipv6_prefix: "2001:db8:dead::/64"
#
# Mode B — enumerate prefixes from a live interface (for DHCPv6 / SLAAC, where
# the prefix is not known statically). Each global-unicast (2000::/3) address
# on the interface is combined with its netmask into a CIDR; random sources are
# drawn inside those prefixes. The pool is refreshed periodically so prefixes
# added/removed after startup take effect without a restart. Linux and macOS.
# outbound_ipv6_interface: "eth0"
# outbound_ipv6_refresh_secs: 30

ws_path_tcp: "/tcp"
ws_path_udp: "/udp"

# Optional OpenConnect-style password prompt on GET /.
# The browser username is ignored; the password is matched against configured users.
# After 3 failed passwords in the same browser session, the server returns 403.
# Non-root HTTP paths still return 404.
# http_root_auth: true
# http_root_realm: "Authorization required"

# Used for generated Outline access keys.
# For IPv6 hosts, use brackets:
# public_host: "[2001:db8::10]:443"
public_host: "vpn.example.com"
public_scheme: "wss"
access_key_url_base: "https://keys.example.com/outline"
# access_key_file_extension: ".yaml"

# Set to true to print Outline YAML configs and ssconf:// URLs, then exit.
print_access_keys: false
# Or write one generated YAML file per user into a directory, then exit.
# write_access_keys_dir: "./keys"

method: "chacha20-ietf-poly1305"
# For `2022-*` methods, use a base64-encoded raw PSK, e.g. `openssl rand -base64 16`.

users:
  - id: "alice"
    password: "change-me"
    fwmark: 1001
    method: "aes-128-gcm"
    ws_path_tcp: "/alice/tcp"
    ws_path_udp: "/alice/udp"

  - id: "bob"
    password: "another-secret"
    fwmark: 1002

  - id: "carol-2022"
    password: "MDEyMzQ1Njc4OWFiY2RlZg=="
    method: "2022-blake3-aes-128-gcm"
    ws_path_tcp: "/carol/tcp"
    ws_path_udp: "/carol/udp"

  - id: "dave-2022-chacha"
    password: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
    method: "2022-blake3-chacha20-poly1305"
    ws_path_tcp: "/dave/tcp"
    ws_path_udp: "/dave/udp"

# Single-user fallback instead of users list:
# password: "change-me"
# fwmark: 1001

# Resource-limit preset. Presets: "small" | "medium" | "large" (default).
# Each preset defines H2/H3 flow-control windows and stream limits plus
# session/NAT timeouts and the global UDP relay task cap.
# tuning_profile: "large"

# Per-field overrides on top of the selected preset. Any field left unset
# inherits from the preset. Unknown fields are rejected.
# tuning:
#   client_active_ttl_secs: 300           # used by client_active / client_up metrics
#   udp_nat_idle_timeout_secs: 300        # NAT entry idle timeout (seconds)
#   udp_max_concurrent_relay_tasks: 4096  # process-wide cap; 0 disables
#   h3_udp_socket_buffer_bytes: 33554432
#   h3_max_concurrent_bidi_streams: 4096
